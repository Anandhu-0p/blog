{% extends 'base.html' %}
{% block title %}Delete Comment{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <h2 class="text-danger"><i class="bi bi-exclamation-triangle"></i></h2>
            <h4>Delete this comment?</h4>
            <p class="text-muted">"{{ comment.content|truncatewords:15 }}"</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'post_detail' comment.post.pk %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
